actions:
  send_message: autonomous
  send_file: notify
  write_agent_memory: autonomous
  search_literature: autonomous
  # All other actions (send_email, draft_email, schedule_task, write_vault,
  # send_slack_dm, publish_to_bus, etc.) fall through to the default 'ask'
  # — Freud should never be doing those, so requiring explicit approval
  # is the right guardrail if the model tries.
  # === C13 additions (2026-04-19) ===
  # Freud's comment above explicitly prefers ask-fallback for cross-agent
  # and scheduling actions — honor that intent rather than the generic
  # C13 defaults.
  publish_to_bus: ask
  schedule_task: ask
  knowledge_publish: autonomous
  write_agent_state: autonomous
  save_skill: draft
  deploy_mini_app: draft
  kg_query: autonomous
  dashboard_query: autonomous
  update_task: notify
  pause_task: notify
  resume_task: notify
  cancel_task: notify
  # === Batch 4 gate closure (2026-07-19) ===
  # task_* writes + pageindex_index now go through the gate. Autonomous =
  # behaviour parity with the old skipGate bypass, but every call leaves an
  # agent_actions audit row (raw material for future promotion/demotion).
  task_add: autonomous
  task_close: autonomous
  task_reopen: autonomous
  pageindex_index: autonomous
  # task_list has gated agent callers since Batch 2C — entry added with
  # payload-attribution wiring (2026-07-19) so agent list calls execute.
  task_list: autonomous
